<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <meta name="theme-color" content="#05070d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HandFusion VR" />
  <title>HandFusion VR v0.6 3D</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <video id="camera" playsinline muted></video>
  <canvas id="view"></canvas>

  <section id="startPanel" class="panel">
    <h1>HandFusion VR</h1>
    <div class="version">v0.6 — 3D real</div>
    <p>
      Painel, teclado, cubo e mãos renderizados em uma cena 3D WebGL.
    </p>

    <label class="startup-performance">
      Desempenho
      <select id="performancePreset">
        <option value="lite">Leve — Android fraco</option>
        <option value="balanced">Equilibrado</option>
        <option value="quality">Qualidade — celular forte</option>
      </select>
    </label>

    <button id="startButton" class="primary">
      Iniciar câmera e rastreamento
    </button>

    <p class="small">
      Use em local iluminado e deixe a câmera traseira descoberta.
    </p>
    <div id="bootStatus" class="status">Aguardando início.</div>
  </section>

  <header id="hud" class="hud hidden">
    <div class="badge">
      <span id="fps">0 FPS</span>
      <span id="hands">0 mãos</span>
      <span id="modeLabel">3D</span>
    </div>
    <div id="gesture" class="gesture">Sem mãos</div>
  </header>

  <aside id="controls" class="controls hidden">
    <button id="vrButton">VR dividido: ON</button>
    <button id="browserButton">Painel Google: ON</button>
    <button id="keyboardButton">Teclado: OFF</button>
    <button id="handsButton">Mãos 3D: ON</button>
    <button id="rotateButton">Girar painel 45°</button>
    <button id="recenterButton">Recentralizar</button>
    <button id="arButton" disabled>AR 6DoF: verificando</button>
    <button id="cameraButton">Trocar câmera</button>
    <button id="performanceButton">Desempenho: Leve</button>
    <button id="fullscreenButton">Tela cheia</button>

    <label>
      Suavização
      <input
        id="smoothing"
        type="range"
        min="0"
        max="0.92"
        step="0.02"
        value="0.72"
      />
    </label>

    <label>
      Separação
      <input
        id="eyeSeparation"
        type="range"
        min="0.025"
        max="0.085"
        step="0.002"
        value="0.058"
      />
    </label>

    <button id="hideControlsButton">Ocultar controles</button>
  </aside>

  <button id="showControlsButton" class="floating hidden">⚙️</button>

  <div id="rotateNotice" class="notice hidden">
    Gire o celular para paisagem.
  </div>

  <script type="module" src="./app.js?v=0.6"></script>
</body>
</html>
